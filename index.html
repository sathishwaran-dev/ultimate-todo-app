<!DOCTYPE html>
<html>
<head>
  <title>Ultimate App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p onclick="showRegister()">Create account</p>
  <p onclick="showForgot()">Forgot password?</p>
</div>

<!-- REGISTER -->
<div id="registerPage" style="display:none">
  <h2>Register</h2>
  <input id="regUser" placeholder="Username">
  <input id="regPass" placeholder="Password">
  <button onclick="register()">Register</button>
  <p onclick="showLogin()">Back</p>
</div>

<!-- FORGOT -->
<div id="forgotPage" style="display:none">
  <h2>Reset Password</h2>
  <input id="forgotUser" placeholder="Username">
  <input id="newPass" placeholder="New Password">
  <button onclick="resetPass()">Reset</button>
  <p onclick="showLogin()">Back</p>
</div>

<!-- APP -->
<div id="appPage" style="display:none">

  <h3 id="welcome"></h3>

  <button onclick="toggleDark()">🌙 Dark</button>
  <button onclick="logout()">Logout</button>

  <input id="taskInput" placeholder="Enter task">
  <input type="date" id="dueDate">

  <select id="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>

  <button onclick="addTask()">Add</button>

  <input id="searchInput" placeholder="Search..." onkeyup="render()">

  <div class="filters">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('completed')">Done</button>
  </div>

  <h4 id="stats"></h4>

  <ul id="taskList"></ul>

  <h3>History</h3>
  <ul id="historyList"></ul>

</div>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
